server:
  port: 8090

tsanet:
  demo:
    # Per-env sqlite caches, credentials files, and the active-environment
    # marker all live under this directory.
    data-dir: ${TSANET_DEMO_DATA_DIR:${user.home}/.tsanet-demo-ui}
    default-environment: beta
    # Production is connect2.tsanet.org — deliberately NOT listed here.
    environments:
      beta:
        label: BETA
        api-base-url: https://connect2.tsanet.net
      dev:
        label: DEV
        api-base-url: https://connect2.tahoelab.us
    auth:
      username: ${TSANET_DEMO_AUTH_USER:demo}
      password: ${TSANET_DEMO_AUTH_PASSWORD:}
